<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PropGate | Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #0078db;
            --primary-hover: #005fa3;
            --secondary: #25c282;
            --dark: #091e42;
            --gray: #6b778c;
            --light-gray: #f4f5f7;
            --white: #ffffff;
            --shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f7f9fc;
            color: var(--dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top Header Nav */
        header {
            background: var(--white);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.04);
            padding: 15px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .logo {
            font-size: 26px;
            font-weight: 700;
            color: var(--dark);
            text-decoration: none;
            display: flex;
            align-items: center;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: var(--secondary);
            margin-left: 2px;
            font-size: 30px;
        }

        .nav-links {
            display: flex;
            align-items: center;
            list-style: none;
            gap: 20px;
        }

        .nav-links a {
            color: var(--gray);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            padding: 8px 12px;
            transition: var(--transition);
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .btn-login {
            background-color: transparent;
            color: var(--primary) !important;
            border: 2px solid var(--primary);
            text-decoration: none;
            padding: 8px 18px;
            border-radius: 20px;
            font-weight: 600;
            transition: var(--transition);
        }

        .btn-login:hover {
            background-color: var(--primary);
            color: var(--white) !important;
            transform: translateY(-1px);
        }

        /* Main Section */
        section {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .register-card {
            background: var(--white);
            border-radius: 16px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 650px;
            padding: 40px;
            border: 1px solid rgba(0, 0, 0, 0.03);
            text-align: center;
        }

        .register-icon {
            width: 70px;
            height: 70px;
            background: rgba(37, 194, 130, 0.08);
            color: var(--secondary);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin-bottom: 20px;
        }

        .register-card h2 {
            font-size: 26px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 8px;
        }

        .register-card p {
            font-size: 14px;
            color: var(--gray);
            margin-bottom: 30px;
        }

        /* Form Grid Layout */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group {
            position: relative;
        }

        .input-group.full-width {
            grid-column: span 2;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray);
            font-size: 16px;
            z-index: 5;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 12px 15px 12px 42px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            color: var(--dark);
            background-color: var(--white);
            transition: var(--transition);
        }

        .input-group input:focus,
        .input-group select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 120, 219, 0.12);
        }

        /* Styling select dropdown placeholders */
        .input-group select:invalid {
            color: #757575;
        }

        .input-group select option {
            color: var(--dark);
        }

        .error-alert {
            background-color: #fff2f0;
            border: 1px solid #ffccc7;
            color: #ff4d4f;
            padding: 12px 15px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
            text-align: left;
            grid-column: span 2;
        }

        .success-alert {
            background-color: #f6ffed;
            border: 1px solid #b7eb8f;
            color: #52c41a;
            padding: 12px 15px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
            text-align: left;
            grid-column: span 2;
        }

        button {
            grid-column: span 2;
            width: 100%;
            padding: 12px;
            background-color: var(--secondary);
            color: var(--white);
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(37, 194, 130, 0.2);
            transition: var(--transition);
            margin-bottom: 20px;
        }

        button:hover {
            background-color: #1eab70;
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(37, 194, 130, 0.3);
        }

        button:disabled {
            background-color: var(--gray);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .switch-link {
            grid-column: span 2;
            font-size: 14px;
            color: var(--gray);
        }

        .switch-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .switch-link a:hover {
            text-decoration: underline;
        }

        /* Footer */
        footer {
            background-color: var(--dark);
            color: rgba(255, 255, 255, 0.6);
            padding: 25px 8%;
            text-align: center;
            font-size: 14px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .input-group.full-width {
                grid-column: span 1;
            }

            button {
                grid-column: span 1;
            }

            .error-alert,
            .success-alert {
                grid-column: span 1;
            }

            .switch-link {
                grid-column: span 1;
            }
        }
    </style>
</head>

<body>

    <!-- Header Navigation -->
    <header>
        <a href="index.html" class="logo">PropGate<span>.</span></a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="login.html" class="btn-login">Login</a></li>
        </ul>
    </header>

    <!-- Form Section -->
    <section>
        <div class="register-card">
            <div class="register-icon">
                <i class="fas fa-user-plus"></i>
            </div>
            <h2>Register Here</h2>
            <p>Create your PropGate account to start managing portfolios</p>

            <form id="register-form">
                <div class="form-grid">
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="reg-username" placeholder="Enter Username" required>
                    </div>

                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="reg-password" placeholder="Enter Password" required>
                    </div>

                    <div class="input-group">
                        <i class="fas fa-id-card"></i>
                        <input type="text" id="reg-fullname" placeholder="Enter Full Name" required>
                    </div>

                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="reg-email" placeholder="Enter Email" required>
                    </div>

                    <div class="input-group">
                        <i class="fas fa-phone"></i>
                        <input type="tel" id="reg-phone" placeholder="Enter Phone Number" required>
                    </div>

                    <div class="input-group">
                        <i class="fas fa-users-cog"></i>
                        <select id="reg-role" required>
                            <option value="" disabled selected hidden>Select User Role</option>
                            <option value="ADMIN">ADMIN</option>
                            <option value="INVESTOR">INVESTOR</option>
                            <option value="AGENT">AGENT</option>
                        </select>
                    </div>

                    <div class="input-group full-width">
                        <i class="fas fa-info-circle"></i>
                        <select id="reg-status" required>
                            <option value="" disabled selected hidden>Availability of the Property</option>
                            <option value="ACTIVE">ACTIVE</option>
                            <option value="INACTIVE">INACTIVE</option>
                        </select>
                    </div>

                    <div id="reg-error" class="error-alert">
                        <i class="fas fa-exclamation-circle"></i>
                        <span>Error content</span>
                    </div>

                    <div id="reg-success" class="success-alert">
                        <i class="fas fa-check-circle"></i>
                        <span>Registration Successful! Redirecting...</span>
                    </div>

                    <button type="submit" id="reg-btn">Register</button>

                    <div class="switch-link">
                        Already have an account? <a href="login.html">Click here to Login</a>
                    </div>
                </div>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 PropGate | Real Estate Portfolio Management System. All Rights Reserved.</p>
    </footer>

    <script>
        const API_BASE = "https://propgatefullstackjavabackend-1.onrender.com";

        document.getElementById("register-form").addEventListener("submit", async function (e) {
            e.preventDefault();

            const username = document.getElementById("reg-username").value.trim();
            const password = document.getElementById("reg-password").value;
            const fullname = document.getElementById("reg-fullname").value.trim();
            const email = document.getElementById("reg-email").value.trim();
            const phone = document.getElementById("reg-phone").value.trim();
            const role = document.getElementById("reg-role").value;
            const status = document.getElementById("reg-status").value;

            const errDiv = document.getElementById("reg-error");
            const sucDiv = document.getElementById("reg-success");
            const btn = document.getElementById("reg-btn");

            errDiv.style.display = "none";
            sucDiv.style.display = "none";

            if (!username || !password || !fullname || !email || !phone || !role || !status) {
                errDiv.querySelector("span").textContent = "Please fill in all required fields.";
                errDiv.style.display = "flex";
                return;
            }

            if (password.length < 6) {
                errDiv.querySelector("span").textContent = "Password must be at least 6 characters.";
                errDiv.style.display = "flex";
                return;
            }

            btn.textContent = "Registering...";
            btn.disabled = true;

            try {
                const res = await fetch(API_BASE + "/auth/register", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password,
                        fullname: fullname,
                        email: email,
                        phone: phone,
                        role: role,
                        status: status
                    })
                });

                if (res.ok) {
                    sucDiv.querySelector("span").textContent = "Registration Successful! Redirecting to Login...";
                    sucDiv.style.display = "flex";
                    document.getElementById("register-form").reset();

                    setTimeout(function () {
                        window.location.href = "login.html";
                    }, 1500);
                }
                else {
                    const data = await res.json().catch(() => ({}));
                    errDiv.querySelector("span").textContent = data.message || "Registration failed.";
                    errDiv.style.display = "flex";
                }
            }
            catch (error) {
                errDiv.querySelector("span").textContent = "Cannot connect to server. Make sure backend is running on port 8080.";
                errDiv.style.display = "flex";
            }
            finally {
                btn.textContent = "Register";
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
