<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PropGate | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #0078db;
            --primary-hover: #005fa3;
            --secondary: #25c282;
            --dark: #091e42;
            --gray: #6b778c;
            --light-gray: #f4f5f7;
            --white: #ffffff;
            --shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f7f9fc;
            color: var(--dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top Header Nav */
        header {
            background: var(--white);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.04);
            padding: 15px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .logo {
            font-size: 26px;
            font-weight: 700;
            color: var(--dark);
            text-decoration: none;
            display: flex;
            align-items: center;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: var(--secondary);
            margin-left: 2px;
            font-size: 30px;
        }

        .nav-links {
            display: flex;
            align-items: center;
            list-style: none;
            gap: 20px;
        }

        .nav-links a {
            color: var(--gray);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            padding: 8px 12px;
            transition: var(--transition);
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .btn-register {
            background-color: var(--primary);
            color: var(--white) !important;
            text-decoration: none;
            padding: 8px 18px;
            border-radius: 20px;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(0, 120, 219, 0.2);
        }

        .btn-register:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        /* Main Section */
        section {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .login-card {
            background: var(--white);
            border-radius: 16px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 420px;
            padding: 40px 35px;
            border: 1px solid rgba(0, 0, 0, 0.03);
            text-align: center;
        }

        .login-icon {
            width: 70px;
            height: 70px;
            background: rgba(0, 120, 219, 0.08);
            color: var(--primary);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin-bottom: 20px;
        }

        .login-card h2 {
            font-size: 26px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 8px;
        }

        .login-card p {
            font-size: 14px;
            color: var(--gray);
            margin-bottom: 30px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray);
            font-size: 16px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px 12px 42px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            color: var(--dark);
            transition: var(--transition);
        }

        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 120, 219, 0.12);
        }

        .error-alert {
            background-color: #fff2f0;
            border: 1px solid #ffccc7;
            color: #ff4d4f;
            padding: 12px 15px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
            text-align: left;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: var(--white);
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0, 120, 219, 0.2);
            transition: var(--transition);
            margin-bottom: 20px;
        }

        button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        button:disabled {
            background-color: var(--gray);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .switch-link {
            font-size: 14px;
            color: var(--gray);
        }

        .switch-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .switch-link a:hover {
            text-decoration: underline;
        }

        /* Footer */
        footer {
            background-color: var(--dark);
            color: rgba(255, 255, 255, 0.6);
            padding: 25px 8%;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <!-- Header Navigation -->
    <header>
        <a href="index.html" class="logo">PropGate<span>.</span></a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="registration.html" class="btn-register">Register</a></li>
        </ul>
    </header>

    <!-- Form Section -->
    <section>
        <div class="login-card">
            <div class="login-icon">
                <i class="fas fa-user-shield"></i>
            </div>
            <h2>Login Here</h2>
            <p>Enter your credentials to access your dashboard</p>

            <form id="login-form">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="login-email" placeholder="Enter Email" required>
                </div>

                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="login-password" placeholder="Enter Password" required>
                </div>

                <div id="login-error" class="error-alert">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="error-text">Invalid credentials.</span>
                </div>

                <button type="submit" id="login-btn">Login</button>

                <div class="switch-link">
                    New User? <a href="registration.html">Register Here</a>
                </div>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 PropGate | Real Estate Portfolio Management System. All Rights Reserved.</p>
    </footer>

    <script>
        const API_BASE = "https://propgatefullstackjavabackend-1.onrender.com";

        document.getElementById("login-form").addEventListener("submit", async function (e) {
            e.preventDefault();

            const email = document.getElementById("login-email").value.trim();
            const password = document.getElementById("login-password").value;

            const errDiv = document.getElementById("login-error");
            const btn = document.getElementById("login-btn");

            errDiv.style.display = "none";

            if (!email || !password) {
                errDiv.querySelector("span").textContent = "Please enter email and password.";
                errDiv.style.display = "flex";
                return;
            }

            btn.textContent = "Logging in...";
            btn.disabled = true;

            try {
                const res = await fetch(API_BASE + "/auth/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password
                    })
                });

                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem("token", data.token);

                    if (data.role) {
                        localStorage.setItem("role", data.role);
                    }

                    alert("Login Successful");

                    if (data.role === "ADMIN") {
                        window.location.href = "admin/admin.html";
                    }
                    else if (data.role === "INVESTOR") {
                        window.location.href = "investor/investor.html";
                    }
                    else if (data.role === "AGENT") {
                        window.location.href = "agent/agent.html";
                    }
                    else {
                        window.location.href = "index.html";
                    }
                }
                else {
                    const data = await res.json().catch(() => ({}));
                    errDiv.querySelector("span").textContent = data.message || "Invalid Email or Password.";
                    errDiv.style.display = "flex";
                }
            }
            catch (error) {
                errDiv.querySelector("span").textContent = "Cannot connect to server. Make sure backend is running.";
                errDiv.style.display = "flex";
            }
            finally {
                btn.textContent = "Login";
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
